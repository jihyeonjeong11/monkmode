<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>집중 모드 활성 중</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --fg: #0A0A0A;
      --border: #E0E0E0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0A0A0A;
        --fg: #FFFFFF;
        --border: #2A2A2A;
      }
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 48px 32px;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .guide {
      font-size: 15px;
      line-height: 1.8;
      opacity: 0.7;
      margin-bottom: 32px;
    }

    #reflection-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      height: 80px;
      margin-bottom: 16px;
    }

    #reflection-input::placeholder { opacity: 0.4; }

    #submit-btn {
      padding: 12px 28px;
      border: 1px solid var(--fg);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #submit-btn:hover {
      background: var(--fg);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <div id="container" class="container">
    <div class="icon">🧘</div>
    <h1>집중 모드 활성 중</h1>
    <p class="guide">
      잠깐 멈추고 호흡을 가다듬으세요.<br>
      지금 이 순간에 집중하세요.
    </p>
    <textarea id="reflection-input" placeholder="왜 이 사이트에 왔나요?"></textarea>
    <br>
    <button id="submit-btn">기록하고 돌아가기</button>
  </div>
  <script src="block-page.js"></script>
</body>
</html>
