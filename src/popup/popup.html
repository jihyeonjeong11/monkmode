<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #1a202c;
      color: #e2e8f0;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }

    /* Timer */
    #timer-section {
      background: #2d3748;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    #phase-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #90cdf4;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    #timer-display {
      font-size: 42px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }
    #timer-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .timer-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #start-btn  { background: #38a169; color: #fff; }
    #pause-btn  { background: #d69e2e; color: #fff; }
    #reset-btn  { background: #4a5568; color: #e2e8f0; }

    /* Blocker toggle */
    #toggle-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    #site-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #4a5568;
      background: #2d3748;
      color: #e2e8f0;
      font-size: 13px;
    }
    #add-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: #4a5568;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 13px;
    }
    #site-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .empty {
      font-size: 12px;
      color: #718096;
      text-align: center;
      padding: 8px 0;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      background: #2d3748;
      border-radius: 6px;
      font-size: 13px;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #fc8181;
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <h1>🧘 Monk Mode</h1>

  <div id="timer-section">
    <div id="phase-label">FOCUS</div>
    <div id="timer-display">--:--</div>
    <div id="timer-controls">
      <button class="timer-btn" id="start-btn">시작</button>
      <button class="timer-btn" id="pause-btn">일시정지</button>
      <button class="timer-btn" id="reset-btn">리셋</button>
    </div>
  </div>

  <button id="toggle-btn">로딩 중...</button>
  <div class="input-row">
    <input id="site-input" type="text" placeholder="youtube.com" />
    <button id="add-btn">추가</button>
  </div>
  <ul id="site-list"></ul>
  <script src="popup.js"></script>
</body>
</html>
