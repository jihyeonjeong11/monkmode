<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --fg: #0A0A0A;
      --border: #E0E0E0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0A0A0A;
        --fg: #FFFFFF;
        --border: #2A2A2A;
      }
    }

    body {
      width: 300px;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    /* Header */
    header {
      text-align: center;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    /* Tab content */
    .tab-panel { display: none; padding: 20px 16px; }
    .tab-panel.active { display: block; }

    /* Duration picker */
    #duration-picker {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }
    #duration-picker button {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #duration-picker button.selected {
      background: var(--fg);
      color: var(--bg);
    }
    #duration-picker button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Phase + Timer */
    #phase-label {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      min-height: 16px;
    }
    #timer-display {
      text-align: center;
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
    }

    /* Timer controls */
    #timer-controls {
      display: flex;
      justify-content: center;
    }
    #timer-controls button {
      padding: 10px 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #start-btn { border-color: var(--fg); }

    /* Stop confirm overlay */
    #stop-confirm {
      display: none;
      text-align: center;
    }
    #stop-confirm p {
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    #stop-confirm em {
      font-style: normal;
      font-weight: 700;
    }
    #stop-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      margin-bottom: 10px;
    }
    #stop-confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    #stop-confirm-actions button {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Blocklist tab */
    .site-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    #site-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
    }
    #add-btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #site-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    [data-site] {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
    }
    [data-remove] {
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      font-size: 12px;
      opacity: 0.5;
      padding: 0 2px;
    }
    [data-remove]:hover { opacity: 1; }

    /* Sessions tab */
    #sessions-summary {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    #sessions-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .session-item { font-size: 13px; }
    .session-meta {
      font-weight: 600;
      margin-bottom: 2px;
    }
    .session-reflection {
      opacity: 0.6;
      font-size: 12px;
    }

    /* Bottom nav */
    nav {
      display: flex;
      border-top: 1px solid var(--border);
    }
    nav button {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: var(--bg);
      color: var(--fg);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.4;
    }
    nav button.active { opacity: 1; }
  </style>
</head>
<body>
  <header>🧘 Monk Mode</header>

  <!-- Timer tab -->
  <div id="tab-timer" class="tab-panel active">
    <div id="duration-picker">
      <button data-hours="1">1h</button>
      <button data-hours="2">2h</button>
      <button data-hours="3">3h</button>
      <button data-hours="4" class="selected">4h</button>
    </div>

    <div id="phase-label"></div>
    <div id="timer-display">--:--</div>

    <div id="timer-controls">
      <button id="start-btn">▶ Start</button>
      <button id="stop-btn" style="display:none">■ Stop</button>
    </div>

    <div id="stop-confirm">
      <p>정말 멈추려면 아래 문구를 입력하세요:<br><em id="stop-phrase"></em></p>
      <input id="stop-input" type="text" placeholder="" />
      <div id="stop-confirm-actions">
        <button id="stop-cancel-btn">취소</button>
        <button id="stop-ok-btn">확인</button>
      </div>
    </div>
  </div>

  <!-- Blocklist tab -->
  <div id="tab-blocklist" class="tab-panel">
    <div class="site-input-row">
      <input id="site-input" type="text" placeholder="youtube.com" />
      <button id="add-btn">+</button>
    </div>
    <ul id="site-list"></ul>
  </div>

  <!-- Sessions tab -->
  <div id="tab-sessions" class="tab-panel">
    <div id="sessions-summary">오늘 0 sessions / 0h 0m</div>
    <div id="sessions-list"></div>
  </div>

  <nav>
    <button id="nav-timer" class="active">Timer</button>
    <button id="nav-blocklist">Blocklist</button>
    <button id="nav-sessions">📊</button>
  </nav>

  <script src="popup.js"></script>
</body>
</html>
